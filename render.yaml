# Render Blueprint — olmazor.nexus30.uz uchun
# Dashboard: New > Blueprint > Connect repo > Apply
#
# Mavjud PostgreSQL ishlatmoqchi bo'lsangiz, databases bo'limini o'chirib,
# web service dagi DATABASE_URL ni qo'lda kiriting.
#
# Eslatma: NODE_ENV=production build vaqtida qo'yilmasin — devDependencies
# (TypeScript, ESLint) o'rnatilishi uchun.

databases:
  - name: olmazor-nexus30-db
    databaseName: olmazor_nexus30
    user: olmazor_nexus30_user
    region: frankfurt
    plan: free
    ipAllowList: []

services:
  - type: web
    name: olmazor-nexus30
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:render
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: olmazor-nexus30-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://olmazor.nexus30.uz
      - key: SEED_ADMIN_EMAIL
        value: admin@nexus30.uz
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: NEXUS30 Admin
      - key: REGISTRATION_IDEATON_CLOSES_AT
        value: "2026-07-13T00:00:00+05:00"
      - key: REGISTRATION_STARTUP_CLOSES_AT
        value: "2026-07-15T00:00:00+05:00"
